<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Web</title>
    <link rel="stylesheet" href="Font Awosome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="header">
        <h2>Notes Web</h2>
        <button class="button-add" onclick="addButton()" id="add-button">+ add</button>
    </header>
    <main id="main-container">
        <!-- <div class="kelas">
            <h2>Add Notes</h2>
            <h3>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum, earum!</h3>
            <button onclick="keeepNotes()">+</button>
        </div> -->
    </main>
    <div class="overlay"></div>
    <div class="card" id="cards">
        <h2>Add New Notes</h2>
        <form action="">
            <label for="inputJudul">Title</label>
            <input type="text" id="inputJudul" placeholder="Add Title">
            <label for="inputContent">Content</label>
            <input type="text" id="inputContent" placeholder="Add Content" class="input-content">
            <button class="cancel-button" onclick="removeNotes()" id="remove-note">Cancel</button>
            <button class="save-button" onclick="keepNotes()" id="save-button">Save</button>
        </form>
    </div>
    <script src="index.js"></script>
</body>
</html>
